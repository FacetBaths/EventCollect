name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        yarn install
        cd client && yarn install

    - name: Stamp build version
      run: |
        SHORT_SHA="${GITHUB_SHA:0:7}"
        BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        export SHORT_SHA BUILD_DATE
        # Bundled copy (imported by boot files / MainLayout)
        node -e "const fs=require('fs');const p='client/src/version.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.commit=process.env.SHORT_SHA;j.buildDate=process.env.BUILD_DATE;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"
        # Public copy (fetched at runtime for cache-bust check)
        node -e "const fs=require('fs');const p='client/public/version.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.commit=process.env.SHORT_SHA;j.buildDate=process.env.BUILD_DATE;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"
        echo "Stamped commit=$SHORT_SHA buildDate=$BUILD_DATE"

    - name: Build frontend
      run: |
        cd client && yarn build
        echo "eventcollect.facetrenovations.us" > dist/spa/CNAME

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './client/dist/spa'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
